version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: adifinity_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: adifinity
      POSTGRES_PASSWORD: adifinity_local
      POSTGRES_DB: invitations
    ports:
      - '5432:5432'
    volumes:
      - adifinity_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U adifinity -d invitations']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  adifinity_pgdata:
