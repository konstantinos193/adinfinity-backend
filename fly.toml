app = "adinfinity-backend"
primary_region = "ams"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3001"
  JWT_EXPIRES_IN = "7d"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
