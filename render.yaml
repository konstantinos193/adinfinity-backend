services:
  - type: web
    name: adifinity-invitations-api
    env: node
    plan: free
    buildCommand: pnpm install --no-frozen-lockfile --prod=false && npx prisma generate && pnpm run build
    startCommand: node dist/main.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: invitations-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: invitations-db
    databaseName: invitations
    user: invitations_user
    plan: free
